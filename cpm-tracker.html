<script defer src="/_vercel/insights/script.js"></script><script src="/components.js" defer></script></head><body><driverz-header></driverz-header><main class="article"><h1>Cost per mile tracker</h1><p>Work out your true fuel cost per mile.</p><section class="card"><form class="tool-form" onsubmit="event.preventDefault();calc()"><div class="field"><label>MPG</label><input id="mpg" type="number" step="any" value="45"></div><div class="field"><label>Fuel price p/litre</label><input id="price" type="number" step="any" value="139.9"></div><div class="field"><label>Monthly miles</label><input id="miles" type="number" step="any" value="800"></div><button class="btn" type="submit">Calculate</button></form><div class="result" id="result">Enter values and calculate.</div></section><div class="quick-answer"><b>Driverz design note:</b> tools stay simple, fast and focused. No unnecessary articles before the calculator.</div></main><script>function calc(){const result=document.getElementById('result');const ppm=(4.54609/mpg.value)*price.value;result.innerHTML='Fuel cost per mile: <b>'+ppm.toFixed(1)+'p</b><br>Monthly fuel estimate: <b>£'+(ppm*miles.value/100).toFixed(2)+'</b>';}calc();</script><driverz-footer></driverz-footer></body></html>
