<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EV Charge Timer | driverz.uk</title><meta name="description" content="Estimate EV charging time."><link rel="icon" href="/favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;750;850;950&display=swap" rel="stylesheet"><link rel="stylesheet" href="/assets/style.css"><script src="/components.js" defer></script></head><body><driverz-header></driverz-header><main class="article"><h1>EV charge timer</h1><p>Simple estimate based on battery size, current charge and charger power.</p><section class="card"><form class="tool-form" onsubmit="event.preventDefault();calc()"><div class="field"><label>Battery size kWh</label><input id="battery" type="number" step="any" value="60"></div><div class="field"><label>Current charge %</label><input id="start" type="number" step="any" value="20"></div><div class="field"><label>Target charge %</label><input id="target" type="number" step="any" value="80"></div><div class="field"><label>Charger power kW</label><input id="power" type="number" step="any" value="7"></div><button class="btn" type="submit">Calculate</button></form><div class="result" id="result">Enter values and calculate.</div></section><div class="quick-answer"><b>Driverz design note:</b> tools stay simple, fast and focused. No unnecessary articles before the calculator.</div></main><script>function calc(){const result=document.getElementById('result');const need=battery.value*((target.value-start.value)/100);result.innerHTML='Energy needed: <b>'+need.toFixed(1)+' kWh</b><br>Estimated time: <b>'+(need/power.value).toFixed(1)+' hours</b>';}calc();</script><driverz-footer></driverz-footer></body></html>
