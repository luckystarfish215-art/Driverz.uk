<script defer src="/_vercel/insights/script.js"></script><script src="/components.js" defer></script></head><body><driverz-header></driverz-header><main class="article"><div class="eyebrow">Contact</div><h1>Contact Driverz</h1><div class="quick-answer">Send feedback, corrections, data questions, partnership or advertising enquiries. Messages are sent securely using Formspree.</div><form class="contact-form" id="contact-form" action="https://formspree.io/f/mykodvaw" method="POST"><input type="hidden" name="_subject" id="formspree-subject" value="Driverz enquiry"><div class="field"><label for="name">Name</label><input id="name" name="name" autocomplete="name" placeholder="Your name" required></div><div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required></div><div class="field"><label for="subject">Subject</label><input id="subject" name="subject" placeholder="Feedback, correction or advertising" required></div><div class="field"><label for="message">Message</label><textarea id="message" name="message" rows="7" placeholder="Write your message…" required></textarea></div><button class="btn accent" type="submit">Send message</button><p class="small-muted">For advertising enquiries, use the Advertise page button and the subject will be filled automatically.</p></form></main><script>const qs=new URLSearchParams(location.search);const subject=document.getElementById('subject');const hiddenSubject=document.getElementById('formspree-subject');if(qs.get('subject'))subject.value=qs.get('subject');function syncSubject(){hiddenSubject.value=subject.value.trim()||'Driverz enquiry';}subject.addEventListener('input',syncSubject);syncSubject();</script><driverz-footer></driverz-footer></body></html>
