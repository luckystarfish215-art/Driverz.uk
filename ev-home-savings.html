<script defer src="/_vercel/insights/script.js"></script><script src="/components.js" defer></script></head><body><driverz-header></driverz-header><main class="article"><h1>EV home charging savings</h1><p>Compare rough home charging cost against public charging.</p><section class="card"><form class="tool-form" onsubmit="event.preventDefault();calc()"><div class="field"><label>Miles per month</label><input id="miles" type="number" step="any" value="800"></div><div class="field"><label>EV miles/kWh</label><input id="eff" type="number" step="any" value="3.5"></div><div class="field"><label>Home p/kWh</label><input id="home" type="number" step="any" value="24"></div><div class="field"><label>Public p/kWh</label><input id="public" type="number" step="any" value="69"></div><button class="btn" type="submit">Calculate</button></form><div class="result" id="result">Enter values and calculate.</div></section><div class="quick-answer"><b>Driverz design note:</b> tools stay simple, fast and focused. No unnecessary articles before the calculator.</div></main><script>function calc(){const result=document.getElementById('result');const kwh=miles.value/eff.value;result.innerHTML='Monthly energy: <b>'+kwh.toFixed(0)+' kWh</b><br>Home: <b>£'+(kwh*home.value/100).toFixed(2)+'</b><br>Public: <b>£'+(kwh*public.value/100).toFixed(2)+'</b><br>Possible saving: <b>£'+(kwh*(public.value-home.value)/100).toFixed(2)+'</b>';}calc();</script><driverz-footer></driverz-footer></body></html>
