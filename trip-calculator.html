<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trip Cost Calculator | driverz.uk</title><meta name="description" content="Estimate UK journey fuel cost."><link rel="icon" href="/favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;750;850;950&display=swap" rel="stylesheet"><link rel="stylesheet" href="/assets/style.css"><script src="/components.js" defer></script></head><body><driverz-header></driverz-header><main class="article"><h1>Trip cost calculator</h1><p>Estimate fuel cost using distance, MPG and fuel price.</p><section class="card"><form class="tool-form" onsubmit="event.preventDefault();calc()"><div class="field"><label>Distance / miles</label><input id="distance" type="number" step="any" value="120"></div><div class="field"><label>MPG</label><input id="mpg" type="number" step="any" value="45"></div><div class="field"><label>Fuel price p/litre</label><input id="price" type="number" step="any" value="139.9"></div><button class="btn" type="submit">Calculate</button></form><div class="result" id="result">Enter values and calculate.</div></section><div class="quick-answer"><b>Driverz design note:</b> tools stay simple, fast and focused. No unnecessary articles before the calculator.</div></main><script>function calc(){const result=document.getElementById('result');const litres=(distance.value/mpg.value)*4.54609;result.innerHTML='Estimated fuel used: <b>'+litres.toFixed(1)+' litres</b><br>Estimated cost: <b>£'+(litres*price.value/100).toFixed(2)+'</b>';}calc();</script><driverz-footer></driverz-footer></body></html>
