name: Update Fuel Prices Daily

permissions:
  contents: write

on:
  # GOV fuel data updates are not real-time. Twice daily keeps the site fresh
  # without polling aggressively or wasting GitHub/Vercel resources.
  schedule:
    - cron: '23 10 * * *'
    - cron: '37 16 * * *'
  workflow_dispatch:

concurrency:
  group: update-fuel-prices
  cancel-in-progress: false

jobs:
  update-csv:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Download latest GOV fuel CSV safely
        shell: bash
        run: |
          set -euo pipefail

          CSV_URL="https://www.fuel-finder.service.gov.uk/internal/v1.0.2/csv/get-latest-fuel-prices-csv"
          TEMP_FILE="data/fuel_data.new.csv"
          CURRENT_FILE="data/fuel_data.csv"

          echo "Downloading GOV fuel CSV at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # No aggressive retries. Clear User-Agent helps GOV logs identify this low-frequency site fetch.
          if ! curl --fail --silent --show-error --location \
            --connect-timeout 15 \
            --max-time 60 \
            --user-agent "DriverzUKFuelUpdater/1.0 (+https://driverz.uk/contact.html)" \
            "$CSV_URL" \
            --output "$TEMP_FILE"; then
            echo "Download failed. Keeping existing CSV."
            rm -f "$TEMP_FILE"
            exit 0
          fi

          # Basic validation: file exists, has meaningful size, enough rows, and expected header fields.
          if [ ! -s "$TEMP_FILE" ]; then
            echo "Downloaded file is empty. Keeping existing CSV."
            rm -f "$TEMP_FILE"
            exit 0
          fi

          LINE_COUNT=$(wc -l < "$TEMP_FILE")
          BYTE_COUNT=$(wc -c < "$TEMP_FILE")

          if [ "$LINE_COUNT" -lt 100 ] || [ "$BYTE_COUNT" -lt 50000 ]; then
            echo "Downloaded CSV looks too small: ${LINE_COUNT} lines, ${BYTE_COUNT} bytes. Keeping existing CSV."
            rm -f "$TEMP_FILE"
            exit 0
          fi

          HEADER=$(head -n 1 "$TEMP_FILE")
          if ! echo "$HEADER" | grep -q "forecourts.location.latitude" || \
             ! echo "$HEADER" | grep -q "prices.E10" || \
             ! echo "$HEADER" | grep -q "prices.B7"; then
            echo "Downloaded CSV header does not look like expected fuel data. Keeping existing CSV."
            rm -f "$TEMP_FILE"
            exit 0
          fi

          # Replace only after validation succeeds.
          mv "$TEMP_FILE" "$CURRENT_FILE"
          echo "Valid CSV downloaded: ${LINE_COUNT} lines, ${BYTE_COUNT} bytes."

      - name: Commit only if fuel data changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/fuel_data.csv

          if git diff --cached --quiet; then
            echo "Fuel data unchanged. No commit needed."
            exit 0
          fi

          git commit -m "Update fuel prices"
          git push
