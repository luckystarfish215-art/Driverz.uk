<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EV vs Petrol Cost | driverz.uk</title><meta name="description" content="Compare EV and petrol driving costs."><link rel="icon" href="/favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;750;850;950&display=swap" rel="stylesheet"><link rel="stylesheet" href="/assets/style.css"><script src="/components.js" defer></script></head><body><driverz-header></driverz-header><main class="article"><h1>EV vs petrol cost</h1><p>A quick running-cost comparison for everyday driving.</p><section class="card"><form class="tool-form" onsubmit="event.preventDefault();calc()"><div class="field"><label>Monthly miles</label><input id="miles" type="number" step="any" value="800"></div><div class="field"><label>Petrol MPG</label><input id="mpg" type="number" step="any" value="45"></div><div class="field"><label>Petrol p/litre</label><input id="petrol" type="number" step="any" value="139.9"></div><div class="field"><label>EV miles/kWh</label><input id="eff" type="number" step="any" value="3.5"></div><div class="field"><label>Electricity p/kWh</label><input id="elec" type="number" step="any" value="24"></div><button class="btn" type="submit">Calculate</button></form><div class="result" id="result">Enter values and calculate.</div></section><div class="quick-answer"><b>Driverz design note:</b> tools stay simple, fast and focused. No unnecessary articles before the calculator.</div></main><script>function calc(){const result=document.getElementById('result');const petrolCost=(miles.value/mpg.value)*4.54609*petrol.value/100;const evCost=(miles.value/eff.value)*elec.value/100;result.innerHTML='Petrol estimate: <b>£'+petrolCost.toFixed(2)+'</b><br>EV estimate: <b>£'+evCost.toFixed(2)+'</b><br>Difference: <b>£'+Math.abs(petrolCost-evCost).toFixed(2)+'</b>';}calc();</script><driverz-footer></driverz-footer></body></html>
